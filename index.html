<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Análise do Bac Bo</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #07111f;
      color: white;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    header {
      background: linear-gradient(135deg, #111d30, #162943);
      padding: 22px 18px;
      border-bottom: 1px solid #29405e;
    }

    header h1 {
      font-size: 25px;
      margin-bottom: 5px;
    }

    header p {
      color: #a8b5c7;
      font-size: 14px;
    }

    .container {
      width: 92%;
      max-width: 700px;
      margin: 20px auto;
    }

    .bacbo-image {
      background: linear-gradient(135deg, #101f35, #0b1627);
      border: 1px solid #29405e;
      border-radius: 20px;
      padding: 25px;
      text-align: center;
      margin-bottom: 18px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }

    .bacbo-image h2 {
      font-size: 30px;
      margin-bottom: 18px;
      color: #f4c542;
    }

    .mesa {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
    }

    .lado {
      width: 120px;
      padding: 15px;
      border-radius: 15px;
    }

    .vermelho {
      background: #b91c1c;
    }

    .azul {
      background: #1d4ed8;
    }

    .lado h3 {
      margin-bottom: 10px;
    }

    .dados {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .dado {
      background: white;
      color: #111;
      width: 38px;
      height: 38px;
      border-radius: 9px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 23px;
      font-weight: bold;
    }

    .acoes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 15px 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .saldo {
      background: #22c55e;
      color: #03130a;
    }

    .conta {
      background: #f4c542;
      color: #211900;
    }

    .card {
      background: #101c2d;
      border: 1px solid #29405e;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 15px;
    }

    .card h3 {
      margin-bottom: 13px;
      font-size: 17px;
    }

    .valor {
      font-size: 28px;
      font-weight: bold;
      color: #22c55e;
    }

    .linha {
      display: flex;
      justify-content: space-between;
      padding: 11px 0;
      border-bottom: 1px solid #263850;
    }

    .linha:last-child {
      border-bottom: none;
    }

    .vermelho-texto {
      color: #ef4444;
      font-weight: bold;
    }

    .azul-texto {
      color: #60a5fa;
      font-weight: bold;
    }

    .amarelo-texto {
      color: #f4c542;
      font-weight: bold;
    }

    .resultado {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .bolinha {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
    }

    .bola-vermelha {
      background: #dc2626;
    }

    .bola-azul {
      background: #2563eb;
    }

    .bola-empate {
      background: #eab308;
      color: #1f1600;
    }

    @media (max-width: 450px) {
      .lado {
        width: 105px;
      }

      .acoes {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Análise do Bac Bo</h1>
    <p>Painel de controle e acompanhamento</p>
  </header>

  <main class="container">

    <section class="bacbo-image">
      <h2>BAC BO</h2>

      <div class="mesa">
        <div class="lado vermelho">
          <h3>Vermelho</h3>
          <div class="dados">
            <div class="dado">⚄</div>
            <div class="dado">⚂</div>
          </div>
        </div>

        <div class="lado azul">
          <h3>Azul</h3>
          <div class="dados">
            <div class="dado">⚅</div>
            <div class="dado">⚀</div>
          </div>
        </div>
      </div>
    </section>

    <div class="acoes">
      <button class="saldo" onclick="adicionarSaldo()">
        + Adicionar saldo
      </button>

      <button class="conta" onclick="adicionarConta()">
        + Adicionar conta
      </button>
    </div>

    <section class="card">
      <h3>Saldo atual</h3>
      <div class="valor" id="saldoAtual">R$ 0,00</div>
    </section>

    <section class="card">
      <h3>Contas adicionadas</h3>
      <div id="listaContas">
        Nenhuma conta adicionada.
      </div>
    </section>

    <section class="card">
      <h3>Análise da mesa</h3>

      <div class="linha">
        <span>Vermelho</span>
        <span class="vermelho-texto">45%</span>
      </div>

      <div class="linha">
        <span>Azul</span>
        <span class="azul-texto">45%</span>
      </div>

      <div class="linha">
        <span>Empate</span>
        <span class="amarelo-texto">10%</span>
      </div>
    </section>

    <section class="card">
      <h3>Últimos resultados</h3>

      <div class="resultado">
        <div class="bolinha bola-vermelha">V</div>
        <div class="bolinha bola-vermelha">V</div>
        <div class="bolinha bola-azul">A</div>
        <div class="bolinha bola-empate">E</div>
        <div class="bolinha bola-azul">A</div>
        <div class="bolinha bola-vermelha">V</div>
      </div>
    </section>

  </main>

  <script>
    let saldo = Number(localStorage.getItem("saldoBacBo")) || 0;
    let contas = JSON.parse(localStorage.getItem("contasBacBo")) || [];

    function atualizarTela() {
      document.getElementById("saldoAtual").innerText =
        saldo.toLocaleString("pt-BR", {
          style: "currency",
          currency: "BRL"
        });

      const lista = document.getElementById("listaContas");

      if (contas.length === 0) {
        lista.innerHTML = "Nenhuma conta adicionada.";
      } else {
        lista.innerHTML = contas
          .map((conta, numero) =>
            `<div class="linha">
              <span>${conta}</span>
              <span>Conta ${numero + 1}</span>
            </div>`
          )
          .join("");
      }
    }

    function adicionarSaldo() {
      const valor = prompt("Digite o valor que deseja adicionar:");

      if (valor === null || valor.trim() === "") return;

      const valorConvertido = Number(
        valor.replace(".", "").replace(",", ".")
      );

      if (isNaN(valorConvertido) || valorConvertido <= 0) {
        alert("Digite um valor válido.");
        return;
      }

      saldo += valorConvertido;
      localStorage.setItem("saldoBacBo", saldo);
      atualizarTela();
    }

    function adicionarConta() {
      const nome = prompt("Digite o nome da conta:");

      if (nome === null || nome.trim() === "") return;

      contas.push(nome.trim());
      localStorage.setItem("contasBacBo", JSON.stringify(contas));
      atualizarTela();
    }

    atualizarTela();
  </script>

</body>
</html>
